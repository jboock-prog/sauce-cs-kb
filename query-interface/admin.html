<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sauce KB Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0F1B2D;
      --navy-light:  #1A2F4A;
      --orange:      #FF6B35;
      --orange-bg:   #FFF0EA;
      --orange-dim:  #FFD5C2;
      --grey-bg:     #F2F2F0;
      --grey-border: #E0DDD8;
      --text:        #1A1A1A;
      --text-muted:  #7A7A7A;
      --white:       #FFFFFF;
      --gap-bg:      #FFFBEB;
      --gap-border:  #F59E0B;
      --gap-text:    #92400E;
      --radius:      12px;
      --radius-sm:   8px;
      --shadow:      0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --sidebar-w:   188px;
      --list-w:      260px;
      --header-h:    56px;
      --footer-h:    60px;
    }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F5F4F1;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ─── Layout ─── */

    #app {
      display: grid;
      grid-template-rows: var(--header-h) 1fr var(--footer-h);
      grid-template-columns: var(--sidebar-w) var(--list-w) 1fr;
      grid-template-areas:
        "header  header  header"
        "sidebar list    editor"
        "footer  footer  footer";
      height: 100vh;
    }

    /* ─── Header ─── */

    #header {
      grid-area: header;
      background: var(--navy);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .logo-dot {
      width: 28px; height: 28px;
      background: var(--orange);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-dot svg { fill: white; width: 15px; height: 15px; }

    .logo-text {
      font-size: 15px; font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }
    .logo-text span { color: var(--orange); }

    .header-meta {
      margin-left: auto;
      display: flex; align-items: center; gap: 16px;
    }

    .entry-count {
      font-size: 13px; color: rgba(255,255,255,.5);
    }
    .entry-count strong { color: var(--white); }

    #dirty-badge {
      display: none;
      font-size: 11px; font-weight: 600;
      background: var(--gap-border);
      color: #78350F;
      padding: 2px 8px;
      border-radius: 99px;
    }
    #dirty-badge.visible { display: inline-block; }

    /* ─── Sidebar ─── */

    #sidebar {
      grid-area: sidebar;
      background: var(--navy);
      border-right: 1px solid rgba(255,255,255,.07);
      overflow-y: auto;
      padding: 12px 8px;
    }

    .sidebar-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,.3);
      padding: 4px 8px 8px;
    }

    .file-btn {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: rgba(255,255,255,.65);
      font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background .12s, color .12s;
      text-align: left;
      gap: 6px;
    }
    .file-btn:hover { background: rgba(255,255,255,.07); color: var(--white); }
    .file-btn.active { background: var(--orange); color: var(--white); }
    .file-btn.error { color: #FCA5A5; }

    .file-btn .fname {
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-btn .fbadge {
      font-size: 11px; font-weight: 700;
      background: rgba(255,255,255,.15);
      padding: 1px 6px; border-radius: 99px;
      flex-shrink: 0;
    }
    .file-btn.active .fbadge { background: rgba(255,255,255,.3); }
    .file-btn .ferr { font-size: 13px; }

    /* ─── Entry list ─── */

    #list {
      grid-area: list;
      background: var(--white);
      border-right: 1px solid var(--grey-border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    #list-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--grey-border);
      flex-shrink: 0;
    }
    #list-header h2 {
      font-size: 13px; font-weight: 700; color: var(--navy);
      margin-bottom: 2px;
    }
    #list-header p {
      font-size: 12px; color: var(--text-muted);
    }

    #entry-list {
      flex: 1; overflow-y: auto;
      padding: 6px 8px;
    }

    .entry-item {
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .1s;
      border: 1.5px solid transparent;
    }
    .entry-item:hover { background: var(--grey-bg); }
    .entry-item.active {
      background: var(--orange-bg);
      border-color: var(--orange-dim);
    }

    .entry-item .eid {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--text-muted);
      margin-bottom: 2px;
    }
    .entry-item.active .eid { color: var(--orange); }

    .entry-item .etitle {
      font-size: 12px; font-weight: 600; color: var(--text);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    #add-entry-btn {
      display: flex; align-items: center; gap: 6px;
      width: calc(100% - 16px);
      margin: 6px 8px 10px;
      padding: 9px 12px;
      border: 1.5px dashed var(--grey-border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: border-color .12s, color .12s, background .12s;
    }
    #add-entry-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: var(--orange-bg);
    }
    #add-entry-btn:disabled {
      opacity: .4; cursor: not-allowed;
    }

    /* ─── Editor ─── */

    #editor {
      grid-area: editor;
      display: flex; flex-direction: column;
      overflow: hidden;
      background: #F5F4F1;
    }

    #editor-scroll {
      flex: 1; overflow-y: auto;
      padding: 20px 24px;
    }

    #editor-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%;
      color: var(--text-muted);
      gap: 8px;
      text-align: center;
    }
    #editor-empty .empty-icon { font-size: 32px; opacity: .4; }
    #editor-empty p { font-size: 13px; }

    #editor-form { display: none; }
    #editor-form.visible { display: block; }

    .editor-title {
      font-size: 16px; font-weight: 700; color: var(--navy);
      letter-spacing: -0.3px;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .editor-title .new-badge {
      font-size: 10px; font-weight: 700;
      background: var(--orange); color: white;
      padding: 2px 7px; border-radius: 99px;
      letter-spacing: 0.3px;
    }

    .form-grid {
      display: flex; flex-direction: column; gap: 14px;
    }

    .field-group { display: flex; flex-direction: column; gap: 5px; }

    .field-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--navy);
    }

    .field-group input,
    .field-group select,
    .field-group textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--grey-border);
      border-radius: var(--radius-sm);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--white);
      outline: none;
      resize: vertical;
      transition: border-color .12s, box-shadow .12s;
    }
    .field-group textarea { line-height: 1.6; }
    .field-group input:focus,
    .field-group select:focus,
    .field-group textarea:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255,107,53,.1);
    }

    /* Extra fields */
    #extra-fields-section { margin-top: 4px; }
    .extra-field-row {
      display: grid; grid-template-columns: 160px 1fr 28px;
      gap: 8px; margin-bottom: 10px; align-items: start;
    }
    .extra-field-row input { font-size: 12px; }
    .extra-field-row textarea {
      font-size: 12px; resize: vertical; min-height: 50px;
    }
    .remove-extra-btn {
      width: 28px; height: 28px;
      border: 1.5px solid var(--grey-border);
      border-radius: 6px;
      background: var(--white);
      color: var(--text-muted);
      font-size: 16px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .1s, color .1s;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .remove-extra-btn:hover { border-color: #EF4444; color: #EF4444; }

    #add-extra-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 10px;
      border: 1.5px dashed var(--grey-border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: border-color .12s, color .12s;
    }
    #add-extra-btn:hover { border-color: var(--orange); color: var(--orange); }

    /* Editor footer */
    #editor-footer {
      flex-shrink: 0;
      padding: 12px 24px;
      background: var(--white);
      border-top: 1px solid var(--grey-border);
      display: flex; gap: 10px; align-items: center;
    }
    #editor-footer .spacer { flex: 1; }

    .btn-delete {
      padding: 8px 14px;
      border: 1.5px solid var(--grey-border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: #B91C1C;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: border-color .12s, background .12s;
    }
    .btn-delete:hover { border-color: #EF4444; background: #FEF2F2; }

    .btn-discard {
      padding: 8px 14px;
      border: 1.5px solid var(--grey-border);
      border-radius: var(--radius-sm);
      background: var(--white);
      color: var(--text-muted);
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: border-color .12s;
    }
    .btn-discard:hover { border-color: #9CA3AF; color: var(--text); }

    .btn-save {
      padding: 8px 18px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--orange);
      color: white;
      font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer;
      transition: opacity .12s, transform .08s;
    }
    .btn-save:hover { opacity: .9; }
    .btn-save:active { transform: scale(.97); }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }

    /* ─── Footer ─── */

    #footer {
      grid-area: footer;
      background: var(--white);
      border-top: 1px solid var(--grey-border);
      display: flex; align-items: center;
      padding: 0 20px;
      gap: 10px;
    }

    .footer-status {
      margin-left: auto;
      font-size: 12px; color: var(--text-muted);
    }

    /* ─── Toast ─── */

    #toast-container {
      position: fixed; bottom: 80px; right: 20px;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none; z-index: 9999;
    }

    .toast {
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      animation: slideIn .2s ease;
      pointer-events: all;
      max-width: 340px;
    }
    .toast.success { background: #1A3A2A; color: #6EE7A7; }
    .toast.error   { background: #3A1A1A; color: #FCA5A5; }
    .toast.info    { background: var(--navy); color: rgba(255,255,255,.8); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ─── Scrollbar styling ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--grey-border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #C0BDB8; }
  </style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="logo-dot">
      <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="8"/></svg>
    </div>
    <span class="logo-text">Sauce <span>KB</span> Admin</span>
    <div class="header-meta">
      <span class="entry-count"><strong id="total-count">–</strong> entries</span>
      <span id="dirty-badge">Unsaved changes</span>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-label">Files</div>
    <div id="file-list"></div>
  </nav>

  <!-- ENTRY LIST -->
  <section id="list">
    <div id="list-header">
      <h2 id="list-title">Select a file</h2>
      <p id="list-subtitle">–</p>
    </div>
    <div id="entry-list"></div>
    <button id="add-entry-btn" disabled>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Add Entry
    </button>
  </section>

  <!-- EDITOR -->
  <main id="editor">
    <div id="editor-scroll">
      <div id="editor-empty">
        <div class="empty-icon">✏️</div>
        <p>Select an entry to edit,<br>or add a new one.</p>
      </div>
      <form id="editor-form" autocomplete="off">
        <div class="editor-title">
          <span id="editor-heading">Edit Entry</span>
          <span class="new-badge" id="new-badge" style="display:none">NEW</span>
        </div>
        <div class="form-grid">

          <div class="field-group">
            <label class="field-label" for="f-title">Title</label>
            <input id="f-title" type="text" placeholder="Descriptive entry title">
          </div>

          <div class="field-group">
            <label class="field-label" for="f-issue-type">Issue Type</label>
            <select id="f-issue-type">
              <option value="Refunds &amp; Credits">Refunds &amp; Credits</option>
              <option value="Order Issues">Order Issues</option>
              <option value="Delivery Issues">Delivery Issues</option>
              <option value="B2B / Restaurant">B2B / Restaurant</option>
              <option value="Account &amp; Billing">Account &amp; Billing</option>
              <option value="Driver / Logistics">Driver / Logistics</option>
              <option value="General / Other">General / Other</option>
              <option value="Operations">Operations</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label" for="f-situation">Situation</label>
            <textarea id="f-situation" rows="2" placeholder="When does this entry apply?"></textarea>
          </div>

          <div class="field-group">
            <label class="field-label" for="f-resolution">Resolution</label>
            <textarea id="f-resolution" rows="8" placeholder="Step-by-step resolution…"></textarea>
          </div>

          <div class="field-group">
            <label class="field-label" for="f-exceptions">Exceptions</label>
            <textarea id="f-exceptions" rows="3" placeholder="Edge cases or exceptions…"></textarea>
          </div>

          <div class="field-group">
            <label class="field-label" for="f-approval">Approval Required</label>
            <input id="f-approval" type="text" placeholder="Yes / No / details…">
          </div>

          <div class="field-group">
            <label class="field-label" for="f-updated">Last Updated</label>
            <input id="f-updated" type="text" placeholder="YYYY-MM-DD — source">
          </div>

          <!-- Extra fields -->
          <div id="extra-fields-section" class="field-group">
            <label class="field-label">Extra Fields</label>
            <div id="extra-fields-list"></div>
            <button type="button" id="add-extra-btn">+ Add extra field</button>
          </div>

        </div>
      </form>
    </div>

    <div id="editor-footer">
      <button class="btn-delete" id="btn-delete" style="display:none">Delete</button>
      <div class="spacer"></div>
      <button class="btn-discard" id="btn-discard">Discard</button>
      <button class="btn-save" id="btn-save">Save</button>
    </div>
  </main>

  <!-- FOOTER -->
  <footer id="footer">
    <span class="footer-status" id="footer-status"></span>
  </footer>

</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────────

  const state = {
    files: [],        // [{filename, header, entries, error}]
    activeFile: null, // filename string
    activeEntry: null,// entry object | 'new' | null
    dirty: false,     // unsaved form changes
  };

  // ─── DOM refs ─────────────────────────────────────────────────────────────

  const $ = id => document.getElementById(id);
  const fileListEl    = $('file-list');
  const entryListEl   = $('entry-list');
  const addEntryBtn   = $('add-entry-btn');
  const listTitle     = $('list-title');
  const listSubtitle  = $('list-subtitle');
  const editorEmpty   = $('editor-empty');
  const editorForm    = $('editor-form');
  const editorHeading = $('editor-heading');
  const newBadge      = $('new-badge');
  const btnDelete     = $('btn-delete');
  const btnDiscard    = $('btn-discard');
  const btnSave       = $('btn-save');
  const totalCount    = $('total-count');
  const dirtyBadge    = $('dirty-badge');
  const footerStatus  = $('footer-status');

  // Form fields
  const fTitle    = $('f-title');
  const fIssue    = $('f-issue-type');
  const fSit      = $('f-situation');
  const fRes      = $('f-resolution');
  const fExc      = $('f-exceptions');
  const fApproval = $('f-approval');
  const fUpdated  = $('f-updated');
  const extraList = $('extra-fields-list');

  // ─── Toast ────────────────────────────────────────────────────────────────

  function toast(msg, type = 'info', duration = 3500) {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    $('toast-container').appendChild(el);
    setTimeout(() => el.remove(), duration);
  }

  // ─── Utility ─────────────────────────────────────────────────────────────

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function totalEntries() {
    return state.files.reduce((n, f) => n + f.entries.length, 0);
  }

  function getFileObj(filename) {
    return state.files.find(f => f.filename === filename);
  }

  function getActiveFileObj() {
    return state.activeFile ? getFileObj(state.activeFile) : null;
  }

  // ─── Dirty tracking ───────────────────────────────────────────────────────

  function markDirty() {
    state.dirty = true;
    dirtyBadge.classList.add('visible');
  }

  function clearDirty() {
    state.dirty = false;
    dirtyBadge.classList.remove('visible');
  }

  // Guard navigation when dirty
  function guardDirty(action) {
    if (state.dirty) {
      if (!confirm('You have unsaved changes. Discard them?')) return;
      clearDirty();
    }
    action();
  }

  // ─── Init ─────────────────────────────────────────────────────────────────

  async function init() {
    footerStatus.textContent = 'Loading…';
    try {
      const res = await fetch('/api/entries');
      const data = await res.json();
      if (!data.files) throw new Error(data.error || 'No files returned');
      state.files = data.files;
      renderSidebar();
      totalCount.textContent = totalEntries();
      footerStatus.textContent = '';
      // Auto-select first file
      if (state.files.length > 0) selectFile(state.files[0].filename);
    } catch (e) {
      toast('Failed to load entries: ' + e.message, 'error', 6000);
      footerStatus.textContent = 'Load failed';
    }
  }

  // ─── Sidebar ─────────────────────────────────────────────────────────────

  function renderSidebar() {
    fileListEl.innerHTML = '';
    for (const f of state.files) {
      const btn = document.createElement('button');
      btn.className = 'file-btn' + (f.error ? ' error' : '') + (f.filename === state.activeFile ? ' active' : '');
      btn.dataset.filename = f.filename;

      const shortName = f.filename.replace('kb-', '').replace('.md', '');
      btn.innerHTML = `
        <span class="fname">${shortName}</span>
        ${f.error
          ? '<span class="ferr">⚠</span>'
          : `<span class="fbadge">${f.entries.length}</span>`
        }
      `;
      btn.addEventListener('click', () => guardDirty(() => selectFile(f.filename)));
      fileListEl.appendChild(btn);
    }
  }

  // ─── File selection ───────────────────────────────────────────────────────

  function selectFile(filename) {
    state.activeFile = filename;
    state.activeEntry = null;
    clearDirty();
    renderSidebar();
    renderEntryList();
    showEditorEmpty();
  }

  // ─── Entry list ───────────────────────────────────────────────────────────

  function renderEntryList() {
    const f = getActiveFileObj();
    entryListEl.innerHTML = '';
    if (!f) return;

    listTitle.textContent = f.filename;
    listSubtitle.textContent = f.error
      ? '⚠ Parse error — ' + f.error
      : `${f.entries.length} entries`;

    addEntryBtn.disabled = !!f.error;

    if (f.error) return;

    for (const entry of f.entries) {
      const item = document.createElement('div');
      item.className = 'entry-item' + (isActiveEntry(entry) ? ' active' : '');
      item.dataset.rawId = entry.raw_id;
      item.innerHTML = `
        <div class="eid">Entry ${entry.raw_id}</div>
        <div class="etitle">${escHtml(entry.title || '(no title)')}</div>
      `;
      item.addEventListener('click', () => guardDirty(() => selectEntry(entry)));
      entryListEl.appendChild(item);
    }
  }

  function isActiveEntry(entry) {
    if (!state.activeEntry || state.activeEntry === 'new') return false;
    return state.activeEntry.raw_id === entry.raw_id;
  }

  // ─── Entry selection ──────────────────────────────────────────────────────

  function selectEntry(entry) {
    state.activeEntry = entry;
    clearDirty();
    renderEntryList();
    showEditorForm(entry, false);
  }

  function selectNew() {
    state.activeEntry = 'new';
    clearDirty();
    renderEntryList();
    const blankEntry = {
      raw_id: null,
      title: '',
      issue_type: 'General / Other',
      situation: '',
      resolution: '',
      exceptions: '',
      approval_required: '',
      last_updated: todayStr() + ' — added',
      extra_fields: [],
    };
    showEditorForm(blankEntry, true);
  }

  // ─── Editor render ────────────────────────────────────────────────────────

  function showEditorEmpty() {
    editorEmpty.style.display = 'flex';
    editorForm.classList.remove('visible');
    btnDelete.style.display = 'none';
  }

  function showEditorForm(entry, isNew) {
    editorEmpty.style.display = 'none';
    editorForm.classList.add('visible');

    editorHeading.textContent = isNew ? 'New Entry' : `Entry ${entry.raw_id}`;
    newBadge.style.display = isNew ? 'inline-block' : 'none';
    btnDelete.style.display = isNew ? 'none' : 'inline-flex';

    fTitle.value       = entry.title || '';
    fIssue.value       = entry.issue_type || 'General / Other';
    fSit.value         = entry.situation || '';
    fRes.value         = entry.resolution || '';
    fExc.value         = entry.exceptions || '';
    fApproval.value    = entry.approval_required || '';
    fUpdated.value     = entry.last_updated || '';

    renderExtraFields(entry.extra_fields || []);
  }

  // ─── Extra fields ─────────────────────────────────────────────────────────

  function renderExtraFields(extras) {
    extraList.innerHTML = '';
    for (const ef of extras) {
      appendExtraField(ef.label, ef.value);
    }
  }

  function appendExtraField(label = '', value = '') {
    const row = document.createElement('div');
    row.className = 'extra-field-row';
    row.innerHTML = `
      <input type="text" placeholder="Field label" value="${escAttr(label)}">
      <textarea placeholder="Value…" rows="2">${escHtml(value)}</textarea>
      <button type="button" class="remove-extra-btn" title="Remove">×</button>
    `;
    row.querySelector('.remove-extra-btn').addEventListener('click', () => {
      row.remove();
      markDirty();
    });
    row.querySelector('input').addEventListener('input', markDirty);
    row.querySelector('textarea').addEventListener('input', markDirty);
    extraList.appendChild(row);
  }

  function collectExtraFields() {
    const rows = extraList.querySelectorAll('.extra-field-row');
    return Array.from(rows).map(row => ({
      label: row.querySelector('input').value.trim(),
      value: row.querySelector('textarea').value,
    })).filter(ef => ef.label);
  }

  // ─── Collect form data ────────────────────────────────────────────────────

  function collectFormData() {
    return {
      raw_id: state.activeEntry !== 'new' ? state.activeEntry?.raw_id : null,
      title:             fTitle.value.trim(),
      issue_type:        fIssue.value,
      situation:         fSit.value,
      resolution:        fRes.value,
      exceptions:        fExc.value,
      approval_required: fApproval.value.trim(),
      last_updated:      fUpdated.value.trim(),
      extra_fields:      collectExtraFields(),
    };
  }

  // ─── Save ─────────────────────────────────────────────────────────────────

  async function saveEntry() {
    fUpdated.value = todayStr() + ' — updated';
    const entry = collectFormData();
    const filename = state.activeFile;
    const isNew = state.activeEntry === 'new';

    btnSave.disabled = true;
    btnSave.textContent = 'Saving…';

    try {
      let url, body;
      if (isNew) {
        url = '/api/entry/new';
        body = { filename, entry };
      } else {
        url = '/api/entry/save';
        body = { filename, entry };
      }

      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);

      // Refresh entries from server
      await reloadFile(filename);

      // Re-select the saved entry
      const f = getFileObj(filename);
      const savedId = isNew ? data.raw_id : entry.raw_id;
      const saved = f?.entries.find(e => e.raw_id === savedId);
      if (saved) {
        state.activeEntry = saved;
        clearDirty();
        renderEntryList();
        showEditorForm(saved, false);
      }

      totalCount.textContent = totalEntries();
      renderSidebar();
      toast(isNew ? 'Entry created.' : 'Entry saved.', 'success');
    } catch (e) {
      toast('Save failed: ' + e.message, 'error', 6000);
    } finally {
      btnSave.disabled = false;
      btnSave.textContent = 'Save';
    }
  }

  // ─── Delete ───────────────────────────────────────────────────────────────

  async function deleteEntry() {
    if (!state.activeEntry || state.activeEntry === 'new') return;
    const entry = state.activeEntry;
    if (!confirm(`Delete Entry ${entry.raw_id}: "${entry.title}"?\n\nThis cannot be undone.`)) return;

    try {
      const res = await fetch('/api/entry/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: state.activeFile, raw_id: entry.raw_id }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);

      await reloadFile(state.activeFile);
      state.activeEntry = null;
      clearDirty();
      renderEntryList();
      showEditorEmpty();
      totalCount.textContent = totalEntries();
      renderSidebar();
      toast('Entry deleted.', 'info');
    } catch (e) {
      toast('Delete failed: ' + e.message, 'error', 6000);
    }
  }

  // ─── Reload file from server ──────────────────────────────────────────────

  async function reloadFile(filename) {
    const res = await fetch('/api/entries');
    const data = await res.json();
    if (!data.files) throw new Error(data.error || 'No files returned');
    state.files = data.files;
  }

  // ─── Event wiring ─────────────────────────────────────────────────────────

  // Form change tracking
  [fTitle, fIssue, fSit, fRes, fExc, fApproval, fUpdated].forEach(el => {
    el.addEventListener('input', markDirty);
    el.addEventListener('change', markDirty);
  });

  // Prevent accidental form submit
  editorForm.addEventListener('submit', e => e.preventDefault());

  // Add entry
  addEntryBtn.addEventListener('click', () => guardDirty(selectNew));

  // Add extra field
  $('add-extra-btn').addEventListener('click', () => {
    appendExtraField();
    markDirty();
  });

  // Editor buttons
  btnSave.addEventListener('click', saveEntry);
  btnDiscard.addEventListener('click', () => {
    guardDirty(() => {
      if (state.activeEntry === 'new') {
        state.activeEntry = null;
        clearDirty();
        renderEntryList();
        showEditorEmpty();
      } else if (state.activeEntry) {
        const entry = state.activeEntry;
        clearDirty();
        showEditorForm(entry, false);
      }
    });
  });
  btnDelete.addEventListener('click', deleteEntry);

  // ─── Helpers ─────────────────────────────────────────────────────────────

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escAttr(str) {
    return String(str).replace(/"/g, '&quot;');
  }

  // ─── Boot ─────────────────────────────────────────────────────────────────

  init();
</script>
</body>
</html>
